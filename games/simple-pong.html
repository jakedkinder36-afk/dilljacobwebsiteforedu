<!DOCTYPE html>\n<html>\n<head>\n    <title>Simple Pong Game</title>\n    <style>\n        canvas {\n            background: #000;\n            display: block;\n            margin: auto;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n\n        // Create the pong paddle\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const player = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: '#fff',\n            score: 0\n        };\n        const computer = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: '#fff',\n            score: 0\n        };\n\n        // Create the pong ball\n        const ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            radius: 10,\n            speed: 4,\n            velocityX: 4,\n            velocityY: 4,\n            color: '#fff'\n        };\n\n        // Draw everything\n        function draw() {\n            // Clear the canvas\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            // Draw the paddles and the ball\n            context.fillStyle = player.color;\n            context.fillRect(player.x, player.y, player.width, player.height);\n            context.fillStyle = computer.color;\n            context.fillRect(computer.x, computer.y, computer.width, computer.height);\n            context.fillStyle = ball.color;\n            context.beginPath();\n            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);\n            context.fill();\n        }\n\n        // Update the game\n        function update() {\n            // Update ball position\n            ball.x += ball.velocityX;\n            ball.y += ball.velocityY;\n\n            // Ball collision with top and bottom\n            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {\n                ball.velocityY = -ball.velocityY;\n            }\n            // Ball collision with paddles\n            let playerPaddle = (ball.x < canvas.width / 2) ? player : computer;\n            if (collision(ball, playerPaddle)) {\n                ball.velocityX = -ball.velocityX;            }\n\n            // Reset ball if it goes out of bounds\n            if (ball.x - ball.radius < 0) {\n                computer.score++;\n                resetBall();\n            } else if (ball.x + ball.radius > canvas.width) {\n                player.score++;\n                resetBall();\n            }\n        }\n\n        // Collision detection\n        function collision(ball, paddle) {\n            return ball.x - ball.radius < paddle.x + paddle.width &&\n                   ball.x + ball.radius > paddle.x &&\n                   ball.y - ball.radius < paddle.y + paddle.height &&\n                   ball.y + ball.radius > paddle.y;\n        }\n\n        // Reset ball to center\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.velocityX = -ball.velocityX;\n        }\n\n        // Control the player paddle\n        canvas.addEventListener('mousemove', (event) => {\n            const rect = canvas.getBoundingClientRect();\n            player.y = event.clientY - rect.top - player.height / 2;\n        });\n\n        // Game loop\n        function gameLoop() {\n            draw();\n            update();\n            requestAnimationFrame(gameLoop);\n        }\n\n        gameLoop();\n    </script>\n</body>\n</html>
