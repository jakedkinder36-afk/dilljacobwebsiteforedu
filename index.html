<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Games Menu</title>
</head>
<body>
    <h1>Menu of Playable HTML5 Games</h1>
    <ul>
        <li><a href="#simple-canvas-game">Simple Canvas Game</a></li>
        <li><a href="#other-game">Other Game Example</a></li>
    </ul>

    <h2 id="simple-canvas-game">Simple Canvas Game</h2>
    <p>This is a simple canvas-based game example. You can copy and paste this code into your own project.</p>
    <canvas id="gameCanvas" width="400" height="400" style="border:1px solid #000000;"></canvas>
    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var x = canvas.width / 2;
        var y = canvas.height - 30;
        var ballRadius = 10;
        var dx = 2;
        var dy = -2;

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#0095DD';
            ctx.fill();
            ctx.closePath();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBall();
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            if (y + dy > canvas.height - ballRadius || y + dy < ballRadius) {
                dy = -dy;
            }
            x += dx;
            y += dy;
        }

        setInterval(draw, 10);
    </script>

    <h2 id="other-game">Other Game Example</h2>
    <p>Details about other games can go here.</p>
</body>
</html>
